<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teste — leitura de planilha privada (AHCROS)</title>
<style>
  body{font-family:system-ui,Arial,sans-serif;max-width:760px;margin:40px auto;padding:0 16px;color:#0f2233;line-height:1.5}
  h2{margin-bottom:4px}
  button{font-size:15px;padding:10px 18px;border:0;border-radius:8px;background:#1a3a53;color:#fff;cursor:pointer}
  button:disabled{opacity:.45;cursor:default}
  pre{background:#f4f6f8;padding:12px;border-radius:8px;overflow:auto;font-size:12px}
  table{border-collapse:collapse;font-size:13px;margin-top:8px}
  td,th{border:1px solid #cdd7df;padding:4px 8px;text-align:left}
  th{background:#eef2f5}
  .msg{margin:14px 0;padding:10px 12px;border-radius:8px;background:#eef2f5}
  .err{background:#fbe9e9;color:#8a1f1f}
  code{background:#eef2f5;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>
  <h2>Teste — leitura de planilha privada</h2>
  <p>Prova de conceito: loga com Google e lê uma planilha <strong>não publicada</strong>, apenas compartilhada com contas autorizadas. Se a tabela aparecer, o mecanismo da Opção C está validado e daí eu integro isso no dashboard real.</p>

  <!-- ============ PREENCHER ESTES TRÊS VALORES ============ -->
  <script>
    const CLIENT_ID = "310582407937-o5gdi1i61uch762mdv8m9kios68egl14.apps.googleusercontent.com";
    const SHEET_ID  = "1s9ygrMqbaNEiQHNJkPnYxsPzlmliiCi8FeUR4uiJ37U";
    const RANGE     = "Página1!A1:Q400";
  </script>
  <!-- ====================================================== -->

  <button id="btn" disabled>Entrar com Google</button>
  <div id="out"></div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    const out = document.getElementById('out');
    const btn = document.getElementById('btn');
    let tokenClient = null;

    function msg(t, isErr){ out.innerHTML = '<div class="msg'+(isErr?' err':'')+'">'+t+'</div>'; }

    function initGis(){
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/spreadsheets.readonly',
        callback: async (resp) => {
          if (resp.error){ msg('Erro de login: ' + resp.error, true); return; }
          await loadData(resp.access_token);
        }
      });
      btn.disabled = false;
    }

    // aguarda a biblioteca do Google carregar
    const wait = setInterval(() => {
      if (window.google && google.accounts && google.accounts.oauth2){
        clearInterval(wait); initGis();
      }
    }, 100);

    btn.onclick = () => {
      if (!tokenClient){ msg('Ainda carregando o login do Google, tente de novo em 1s.', true); return; }
      tokenClient.requestAccessToken({ prompt: '' });
    };

    async function loadData(token){
      msg('Buscando dados...');
      try {
        const url = 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID +
                    '/values/' + encodeURIComponent(RANGE);
        const r = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
        if (!r.ok){
          const e = await r.text();
          msg('A API recusou (HTTP ' + r.status + '). Causas comuns: a conta logada não está compartilhada na planilha, ou o SHEET_ID / RANGE está errado.<br><pre>' + e.slice(0,700) + '</pre>', true);
          return;
        }
        const data = await r.json();
        const rows = data.values || [];
        if (!rows.length){ msg('Conectou, mas o intervalo veio vazio. Confira o nome da aba e o RANGE.', true); return; }
        let html = '<div class="msg">Leitura OK — ' + rows.length + ' linha(s). A planilha continua privada; o acesso passou pelo login.</div><table>';
        rows.forEach((row, i) => {
          html += '<tr>';
          row.forEach(c => { html += (i===0 ? '<th>' : '<td>') + (c ?? '') + (i===0 ? '</th>' : '</td>'); });
          html += '</tr>';
        });
        html += '</table>';
        out.innerHTML = html;
      } catch (err){
        msg('Falha de rede/JS: ' + err.message, true);
      }
    }
  </script>
</body>
</html>
